name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.6"

jobs:
  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run --filter @meta-search/web build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  build-binary:
    name: Build ${{ matrix.label }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            label: linux-x64
            artifact: meta-search-linux-x64
          - target: bun-linux-arm64
            runner: ubuntu-latest
            label: linux-arm64
            artifact: meta-search-linux-arm64
          - target: bun-darwin-x64
            runner: macos-13
            label: darwin-x64
            artifact: meta-search-darwin-x64
          - target: bun-darwin-arm64
            runner: macos-14
            label: darwin-arm64
            artifact: meta-search-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      # Download pre-built web frontend
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      # Build workspace packages
      - run: bun run --filter @meta-search/shared build
      - run: bun run --filter @meta-search/config build
      - run: bun run --filter @meta-search/runtime build

      # Generate embedded assets
      - run: bun ./scripts/embed-assets.mjs

      # Compile binary
      - run: |
          mkdir -p dist-bin
          bun build --compile --target=${{ matrix.target }} \
            --outfile dist-bin/${{ matrix.artifact }} \
            apps/server/src/index.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          retention-days: 5

  release:
    name: Create Release
    needs: build-binary
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/meta-search-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
            cd release && sha256sum "$name" > "$name.sha256" && cd ..
          done
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
