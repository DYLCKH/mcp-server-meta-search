name: Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0)"
        required: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.6"

jobs:
  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run --filter @meta-search/web build

      - uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  build-binary:
    name: Build ${{ matrix.label }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            label: linux-x64
            artifact: meta-search-linux-x64
          - target: bun-linux-arm64
            runner: ubuntu-latest
            label: linux-arm64
            artifact: meta-search-linux-arm64
          - target: bun-darwin-arm64
            runner: macos-14
            label: darwin-arm64
            artifact: meta-search-darwin-arm64
          - target: bun-windows-x64
            runner: ubuntu-latest
            label: windows-x64
            artifact: meta-search-windows-x64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      # Download pre-built web frontend
      - uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist/

      # Build workspace packages
      - run: bun run --filter @meta-search/shared build
      - run: bun run --filter @meta-search/config build
      - run: bun run --filter @meta-search/runtime build

      # Generate embedded assets
      - run: bun ./scripts/embed-assets.mjs

      # Compile binary
      - run: |
          mkdir -p dist-bin
          bun build --compile --target=${{ matrix.target }} \
            --outfile dist-bin/${{ matrix.artifact }} \
            apps/server/src/index.ts

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          retention-days: 5

  release:
    name: Create Release
    needs: build-binary
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts/
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/meta-search-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
            cd release && sha256sum "$name" > "$name.sha256" && cd ..
          done
          ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  release-dev:
    name: Rolling Dev Release
    needs: build-binary
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: release-dev
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts/
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/meta-search-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
            cd release && sha256sum "$name" > "$name.sha256" && cd ..
          done
          ls -lh release/

      - name: Compute release name
        id: relname
        run: |
          RUN_PADDED=$(printf '%04d' ${{ github.run_number }})
          DATE_STR=$(date -u +%Y%m%d)
          echo "name=dev-${RUN_PADDED}-${DATE_STR}" >> "$GITHUB_OUTPUT"

      - name: Remove previous dev release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete dev --yes --cleanup-tag || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: ${{ steps.relname.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: "false"
          files: release/*
          body: |
            Rolling pre-release built from `main` (${{ github.sha }}).

            - Build: `${{ steps.relname.outputs.name }}`
            - Commit: ${{ github.sha }}
            - Run: ${{ github.run_number }}
