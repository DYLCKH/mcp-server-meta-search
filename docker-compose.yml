services:
  meta-search:
    build: .
    image: meta-search:latest
    container_name: meta-search
    ports:
      - "3000:3000"
    volumes:
      - ./config.jsonc:/app/config.jsonc:ro
      - logs-data:/app/logs
    environment:
      - CONFIG_PATH=/app/config.jsonc
      - LOGS_DB_PATH=/app/logs/logs.db
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      # Uncomment to set admin password on first run:
      # - ADMIN_PASSWORD=changeme
      # Uncomment to set admin session secret (required for admin login):
      # - ADMIN_SESSION_SECRET=a-random-secret-at-least-32-chars
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/healthz', r => { r.statusCode === 200 ? process.exit(0) : process.exit(1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  logs-data:
